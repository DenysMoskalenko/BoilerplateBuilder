{%- if cookiecutter.use_pre_commit == "yes" %}
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [ --markdown-linebreak-ext=md ]
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [ --maxkb=1024 ]
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types: [ python ]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [ python ]
      - id: ty
        name: ty
        entry: ty check
        language: system
        pass_filenames: false
{%- endif %}
