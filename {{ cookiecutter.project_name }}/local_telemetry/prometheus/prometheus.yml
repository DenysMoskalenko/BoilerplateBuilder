{%- if cookiecutter.generate_local_otel_stack == "yes" %}
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: '{{ cookiecutter.project_name.lower() }}-app'
    static_configs:
      - targets: [ '{{ cookiecutter.project_name.lower() }}-app:8000' ]
    metrics_path: /metrics/
{%- endif %}
